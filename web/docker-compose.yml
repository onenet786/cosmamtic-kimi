version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: cosmamtic-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cosmamtic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmamtic-app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cosmamtic?schema=public
      NEXTAUTH_SECRET: your-secret-key-change-in-production
      NEXTAUTH_URL: http://localhost:2025
    ports:
      - "2025:2025"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
